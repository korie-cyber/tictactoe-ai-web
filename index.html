<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic-Tac-Toe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<!-- Circuit-board background -->
<div class="circuit-bg" aria-hidden="true">
  <svg viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <filter id="glow">
        <feGaussianBlur stdDeviation="3" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <filter id="node-bloom">
        <feGaussianBlur stdDeviation="5" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <!-- Dot grid pattern -->
      <pattern id="dot-grid" width="24" height="24" patternUnits="userSpaceOnUse">
        <circle cx="12" cy="12" r="0.5" fill="rgba(125,211,252,0.08)"/>
      </pattern>
    </defs>

    <!-- Dot grid layer -->
    <rect width="100%" height="100%" fill="url(#dot-grid)"/>

    <!-- Static dim traces -->
    <g stroke="#1E293B" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M720 450 L720 300 L580 300 L580 180 L440 180 L440 80"/>
      <path d="M720 450 L720 600 L860 600 L860 720 L1000 720 L1000 820"/>
      <path d="M720 450 L580 450 L580 350 L400 350 L400 250 L260 250"/>
      <path d="M720 450 L860 450 L860 550 L1040 550 L1040 650 L1180 650"/>
      <path d="M720 450 L650 380 L650 260 L550 260 L550 140 L450 140"/>
      <path d="M720 450 L790 520 L790 640 L890 640 L890 760 L990 760"/>
      <path d="M720 450 L620 450 L620 520 L480 520 L480 620 L340 620 L340 750"/>
      <path d="M720 450 L820 450 L820 380 L960 380 L960 280 L1100 280 L1100 150"/>
      <path d="M720 450 L720 380 L840 380 L840 280 L960 280"/>
      <path d="M720 450 L720 520 L600 520 L600 620 L480 620"/>
      <path d="M720 450 L660 390 L540 390 L540 290 L380 290"/>
      <path d="M720 450 L780 510 L900 510 L900 610 L1060 610"/>
    </g>

    <!-- Bright traveling pulses -->
    <g filter="url(#glow)" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path class="trace-glow" stroke="#38BDF8" stroke-width="2"
        d="M720 450 L720 300 L580 300 L580 180 L440 180 L440 80"/>
      <path class="trace-glow-2" stroke="#7DD3FC" stroke-width="2"
        d="M720 450 L720 600 L860 600 L860 720 L1000 720 L1000 820"/>
      <path class="trace-glow-3" stroke="#38BDF8" stroke-width="2"
        d="M720 450 L580 450 L580 350 L400 350 L400 250 L260 250"/>
      <path class="trace-glow-4" stroke="#7DD3FC" stroke-width="2"
        d="M720 450 L860 450 L860 550 L1040 550 L1040 650 L1180 650"/>
      <path class="trace-glow-5" stroke="#38BDF8" stroke-width="1.5"
        d="M720 450 L650 380 L650 260 L550 260 L550 140 L450 140"/>
      <path class="trace-glow-6" stroke="#7DD3FC" stroke-width="1.5"
        d="M720 450 L790 520 L790 640 L890 640 L890 760 L990 760"/>
      <path class="trace-glow-7" stroke="#38BDF8" stroke-width="1.5"
        d="M720 450 L620 450 L620 520 L480 520 L480 620 L340 620 L340 750"/>
      <path class="trace-glow-8" stroke="#7DD3FC" stroke-width="1.5"
        d="M720 450 L820 450 L820 380 L960 380 L960 280 L1100 280 L1100 150"/>
    </g>

    <!-- Glowing nodes at intersections -->
    <g filter="url(#node-bloom)">
      <circle class="node-glow" cx="720" cy="450" r="4" fill="#38BDF8" style="animation-delay:0s"/>
      <circle class="node-glow" cx="580" cy="300" r="3" fill="#7DD3FC" style="animation-delay:-1s"/>
      <circle class="node-glow" cx="860" cy="600" r="3" fill="#7DD3FC" style="animation-delay:-2.2s"/>
      <circle class="node-glow" cx="400" cy="350" r="2.5" fill="#38BDF8" style="animation-delay:-0.5s"/>
      <circle class="node-glow" cx="1040" cy="550" r="2.5" fill="#38BDF8" style="animation-delay:-3.5s"/>
      <circle class="node-glow" cx="650" cy="260" r="2.5" fill="#7DD3FC" style="animation-delay:-1.8s"/>
      <circle class="node-glow" cx="890" cy="640" r="2.5" fill="#7DD3FC" style="animation-delay:-4.2s"/>
      <circle class="node-glow" cx="480" cy="520" r="2" fill="#38BDF8" style="animation-delay:-2.7s"/>
      <circle class="node-glow" cx="960" cy="380" r="2" fill="#38BDF8" style="animation-delay:-0.3s"/>
      <circle class="node-glow" cx="840" cy="280" r="2" fill="#7DD3FC" style="animation-delay:-3s"/>
      <circle class="node-glow" cx="600" cy="520" r="2" fill="#7DD3FC" style="animation-delay:-1.5s"/>
    </g>
  </svg>
</div>

<div class="game-panel" role="main" aria-label="Tic-Tac-Toe Game">
  <span class="corner-br" aria-hidden="true"></span>

  <!-- Header -->
  <div class="header">
    <h1>Tic-Tac-Toe</h1>
    <span class="label-tag">vs artificial intelligence</span>
  </div>

  <!-- Segmented Controls -->
  <div class="controls-row">
    <div class="seg-group" role="group" aria-label="Choose your marker">
      <span class="seg-label">Play As</span>
      <div class="seg-track" id="marker-track">
        <div class="slider" id="marker-slider"></div>
        <button class="seg-btn" data-marker="X" aria-pressed="true" type="button">X</button>
        <button class="seg-btn" data-marker="O" aria-pressed="false" type="button">O</button>
      </div>
    </div>
    <div class="seg-group" role="group" aria-label="Difficulty level">
      <span class="seg-label">Difficulty</span>
      <div class="seg-track" id="diff-track">
        <div class="slider" id="diff-slider"></div>
        <button class="seg-btn" data-diff="easy" aria-pressed="false" type="button">Easy</button>
        <button class="seg-btn" data-diff="medium" aria-pressed="true" type="button">Medium</button>
        <button class="seg-btn" data-diff="hard" aria-pressed="false" type="button">Hard</button>
      </div>
    </div>
  </div>

  <!-- Score Panel -->
  <div class="score-row" role="group" aria-label="Scores">
    <div class="score-card">
      <div class="score-label">You</div>
      <div class="score-value" id="score-human">0</div>
      <div class="streak-badge" id="streak-badge" hidden>
        <span class="flame" aria-hidden="true">&#x1F525;</span>
        <span id="streak-count">0</span>
      </div>
    </div>
    <div class="score-card">
      <div class="score-label">Draw</div>
      <div class="score-value" id="score-draw">0</div>
    </div>
    <div class="score-card">
      <div class="score-label">AI</div>
      <div class="score-value" id="score-ai">0</div>
    </div>
  </div>

  <!-- Turn Indicator -->
  <div class="turn-indicator" aria-live="polite">
    <span class="turn-text" id="turn-text">YOUR TURN</span>
  </div>

  <!-- Board -->
  <div class="board-wrapper" id="board-wrapper">
    <div class="board" id="board" role="grid" aria-label="Game board">
      <div class="cell" role="gridcell" tabindex="0" aria-label="Cell 1: empty"></div>
      <div class="cell" role="gridcell" tabindex="0" aria-label="Cell 2: empty"></div>
      <div class="cell" role="gridcell" tabindex="0" aria-label="Cell 3: empty"></div>
      <div class="cell" role="gridcell" tabindex="0" aria-label="Cell 4: empty"></div>
      <div class="cell" role="gridcell" tabindex="0" aria-label="Cell 5: empty"></div>
      <div class="cell" role="gridcell" tabindex="0" aria-label="Cell 6: empty"></div>
      <div class="cell" role="gridcell" tabindex="0" aria-label="Cell 7: empty"></div>
      <div class="cell" role="gridcell" tabindex="0" aria-label="Cell 8: empty"></div>
      <div class="cell" role="gridcell" tabindex="0" aria-label="Cell 9: empty"></div>
    </div>
    <div class="win-line-container" id="win-line-container" aria-hidden="true"></div>
  </div>

  <!-- Bottom Controls -->
  <div class="bottom-controls">
    <button class="btn-glass" id="btn-new-game" type="button">New Game</button>
  </div>
</div>

<!-- Result Modal -->
<div class="result-overlay" id="result-overlay" role="dialog" aria-modal="true" aria-label="Game result">
  <div class="result-modal" id="result-modal">
    <div class="result-badge">
      <div class="piece" id="result-badge-piece"></div>
    </div>
    <h2 class="result-title" id="result-title">You Win</h2>
    <p class="result-subtitle" id="result-subtitle">Well played!</p>
    <div class="result-actions">
      <button class="btn-glass primary" id="btn-play-again" type="button">Play Again</button>
      <button class="btn-glass" id="btn-change-diff" type="button">Close</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script type="module" src="js/app.js"></script>
</body>
</html>
